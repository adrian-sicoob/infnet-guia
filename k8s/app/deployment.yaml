apiVersion: apps/v1
kind: Deployment
metadata:
  name: infnet-guia
  namespace: infnet-guia
  labels:
    app: infnet-guia
spec:
  replicas: 4
  selector:
    matchLabels:
      app: infnet-guia
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: infnet-guia
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      containers:
        - name: infnet-guia
          image: SEU_USUARIO_DOCKERHUB/infnet-guia:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # ── Readiness Probe ─────────────────────────────────────────────────
          # O pod só entra em serviço quando responder 200 em /api/health
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          # ── Liveness Probe ──────────────────────────────────────────────────
          # Reinicia o container se ficar sem responder por 3 tentativas
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
